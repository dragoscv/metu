name: release-companion

on:
  push:
    tags:
      - 'companion-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. companion-v0.1.0). Leave empty to use HEAD.'
        required: false

concurrency:
  group: release-companion-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            tauri-args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/companion/src-tauri

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Generate platform icons
        run: node scripts/ensure-companion-icon.mjs

      - name: Typecheck companion
        run: pnpm --filter @metu/companion typecheck

      - name: Resolve release version
        id: ver
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "$REF" == companion-v* ]]; then
            VERSION="${REF#companion-v}"
          else
            VERSION=$(node -p "require('./apps/companion/package.json').version")
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=companion-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build & publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/companion
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: 'METU Companion v${{ steps.ver.outputs.version }}'
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/apps/companion/CHANGELOG.md) for details.

            ### Install
            - **Windows**: download the `.exe` (NSIS, per-user, no admin required).
            - **macOS**: download the `.dmg`, open it, drag METU Companion to Applications.
            - **Linux**: download the `.AppImage`, mark executable, double-click. Or install the `.deb`.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.tauri-args }}
