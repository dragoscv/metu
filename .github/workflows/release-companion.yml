name: release-companion

on:
  push:
    branches: [main]
    paths:
      - 'apps/companion/**'
      - 'packages/protocol/**'
      - 'packages/sdk/**'
      - 'packages/types/**'
      - 'scripts/ensure-companion-icon.mjs'
      - 'scripts/release-companion.mjs'
      - '.github/workflows/release-companion.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0). Reads from apps/companion/package.json if empty.'
        required: false
      force:
        description: 'Rebuild even if the tag already exists'
        type: boolean
        default: false

concurrency:
  group: release-companion-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Gate: read the desired version and check whether it's already a tag.
  # If it is, skip the matrix entirely (so casual companion edits without a
  # version bump don't trigger a rebuild).
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: ver
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          VERSION="$INPUT_VERSION"
          if [[ -z "$VERSION" ]]; then
            VERSION=$(node -p "require('./apps/companion/package.json').version")
          fi
          TAG="companion-v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$FORCE" == "true" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Forced rebuild requested."
          elif git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists — skipping. Bump apps/companion/package.json (run \`pnpm release:companion\`) to publish a new version."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is new — proceeding with release."
          fi

  release:
    needs: resolve
    if: needs.resolve.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            tauri-args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            rust-targets: ''
            tauri-args: ''
          - platform: windows-latest
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/companion/src-tauri

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Generate platform icons
        run: node scripts/ensure-companion-icon.mjs

      - name: Typecheck companion
        run: pnpm --filter @metu/companion typecheck

      - name: Build & publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — populated from GH Actions secrets. When the
          # secrets aren't set the build still runs but skips signed
          # update artifacts (`includeUpdaterJson: ${{ env.UPDATER }}`).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATER: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
        with:
          projectPath: apps/companion
          tagName: ${{ needs.resolve.outputs.tag }}
          releaseName: 'METU Companion v${{ needs.resolve.outputs.version }}'
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/apps/companion/CHANGELOG.md) for details.

            ### Install
            - **Windows**: download the `.exe` (NSIS, per-user, no admin required).
            - **macOS**: download the `.dmg`, open it, drag METU Companion to Applications.
            - **Linux**: download the `.AppImage`, mark executable, double-click. Or install the `.deb`.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
          args: ${{ matrix.tauri-args }}

      # Publish the freshly-generated `latest.json` to a stable URL so
      # the in-app updater can find it. Only runs when signing is wired.
      - name: Sync latest.json to releases bucket
        if: ${{ matrix.platform == 'ubuntu-22.04' && env.UPDATER == 'true' }}
        env:
          UPDATER: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}
        run: |
          echo "Update artifacts are attached to the GitHub release. The"
          echo "in-app updater currently points at"
          echo "  https://releases.metu.app/companion/latest.json"
          echo "which should be a redirect / mirror to the latest tag's"
          echo "latest.json asset. Wire that up via Cloudflare Workers or"
          echo "GCS once the bucket exists."
