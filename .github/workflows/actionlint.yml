name: actionlint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yml'

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        # Pinned official binary; runs against every workflow under .github/workflows.
        # Picks up .github/actionlint.yml automatically for our self-hosted-runner
        # / custom-action allowlist (none today, file is empty placeholder).
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION=1.7.12
          curl -sSLo actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf actionlint.tgz actionlint
          ./actionlint -color
