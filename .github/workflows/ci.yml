name: ci

on:
  push:
    branches: [main]
    # Run only when files that affect web/worker/hub/mcp-server change.
    # Companion-only / mobile-only / docs-only pushes are handled by their
    # own workflows (or skipped entirely).
    paths:
      - 'apps/web/**'
      - 'apps/worker/**'
      - 'apps/hub/**'
      - 'apps/mcp-server/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/worker/**'
      - 'apps/hub/**'
      - 'apps/mcp-server/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck build --concurrency=4
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
          AUTH_SECRET: ci-dummy-secret-not-used
          AUTH_URL: http://localhost:3000
          ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          NEXT_TELEMETRY_DISABLED: '1'
      - run: pnpm turbo run test --concurrency=2
