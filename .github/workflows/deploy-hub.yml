name: deploy-hub

on:
  push:
    branches: [main]
    # Only redeploy when the hub or its shared deps actually change.
    paths:
      - 'apps/hub/**'
      - 'packages/db/**'
      - 'packages/auth/**'
      - 'packages/logger/**'
      - 'packages/protocol/**'
      - '.github/workflows/deploy-hub.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-hub-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: metu-prod-495423
  REGION: europe-west1
  SERVICE: metu-hub
  IMAGE: europe-west1-docker.pkg.dev/metu-prod-495423/containers/metu-hub

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: metu-github-deployer@metu-prod-495423.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest -f apps/hub/Dockerfile .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      # Deploy with the image only; service config (VPC connector, secrets,
      # env vars, ingress, SA) is preserved from the existing service.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image=$IMAGE:${{ github.sha }} \
            --region=$REGION \
            --project=$PROJECT_ID \
            --quiet
